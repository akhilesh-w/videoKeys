<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoKeys</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <img src="icons/icon48.png" class="logo" alt="VideoKeys">
        <div class="header-text">
          <h1>VideoKeys</h1>
          <p class="subtitle">YouTube shortcuts everywhere</p>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="globalToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Site toggle -->
    <div class="site-row" id="siteRow">
      <div class="site-info">
        <span class="site-dot" id="siteDot"></span>
        <span class="site-name" id="siteName">—</span>
      </div>
      <button class="site-toggle-btn" id="siteToggle">Enabled</button>
    </div>

    <!-- Video status -->
    <div class="status-row" id="statusRow">
      <span class="status-icon" id="statusIcon">○</span>
      <span class="status-text" id="statusText">No videos detected</span>
    </div>

    <!-- Shortcuts reference -->
    <div class="shortcuts-section">
      <button class="shortcuts-toggle" id="shortcutsToggle">
        <span>Keyboard Shortcuts</span>
        <span class="chevron" id="chevron">▾</span>
      </button>
      <div class="shortcuts-list" id="shortcutsList">
        <table class="shortcuts-table">
          <tbody>
            <tr class="group-header">
              <td colspan="2">Playback</td>
            </tr>
            <tr>
              <td><kbd>K</kbd> <span class="or">or</span> <kbd>Space</kbd></td>
              <td>Play / Pause</td>
            </tr>
            <tr>
              <td><kbd>J</kbd></td>
              <td>Rewind 10s</td>
            </tr>
            <tr>
              <td><kbd>L</kbd></td>
              <td>Forward 10s</td>
            </tr>
            <tr>
              <td><kbd>←</kbd> <kbd>→</kbd></td>
              <td>Seek ±5s</td>
            </tr>
            <tr>
              <td><kbd>0</kbd> — <kbd>9</kbd></td>
              <td>Jump to 0–90%</td>
            </tr>

            <tr class="group-header">
              <td colspan="2">Audio & Speed</td>
            </tr>
            <tr>
              <td><kbd>↑</kbd> <kbd>↓</kbd></td>
              <td>Volume ±5%</td>
            </tr>
            <tr>
              <td><kbd>M</kbd></td>
              <td>Mute / Unmute</td>
            </tr>
            <tr>
              <td><kbd>⇧</kbd><kbd>></kbd></td>
              <td>Speed up</td>
            </tr>
            <tr>
              <td><kbd>⇧</kbd><kbd>
                  << /kbd>
              </td>
              <td>Slow down</td>
            </tr>

            <tr class="group-header">
              <td colspan="2">Other</td>
            </tr>
            <tr>
              <td><kbd>F</kbd></td>
              <td>Fullscreen</td>
            </tr>
            <tr>
              <td><kbd>,</kbd> <kbd>.</kbd></td>
              <td>Frame step (paused)</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
